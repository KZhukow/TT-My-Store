steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.17.0'
    displayName: 'Install Node.js'

  - script: |
      npm install
    displayName: 'Installing modules'

  - script: |
      npm install typescript
    displayName: 'Install TypeScript'

  - script: |
      npm run pretest
    displayName: 'Check build'

  - script: |
      npm run lint
    displayName: 'Check lint & prettier'
