name: AutoTests

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  AutoTesting:
    timeout-minutes: 210
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17.0'
      
      - name: Install dependencies
        run: |
          npm install
          npm install typescript
      
      - name: Check build
        run: npm run pretest
      
      - name: Check lint & prettier
        run: npm run lint
        continue-on-error: true
      
      - name: Execute tests chromium
        run: npx playwright test --config=_configs/remoteConfigs/remotePlaywright.config.ts --project chromium
        continue-on-error: true
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-chromium
          path: test-results/
          retention-days: 30
      
      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-chromium
          path: '**/results_chromium.xml'
          retention-days: 30
